<!DOCTYPE html>

<html lang="pt"><head>

<style>
        .list-item-enter { animation: slideIn 0.3s ease-out forwards; }
        .list-item-leave { animation: slideOut 0.3s ease-in forwards; opacity: 0.4; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideOut { from { transform: scale(1); } to { transform: scale(0.98); opacity: 0.4; } }
        .checked-item { opacity: 0.6; transition: all 0.3s ease; }
        .checkbox-custom:checked + div { background-color: theme('colors.primary-container'); border-color: theme('colors.primary-container'); }
        .checkbox-custom:checked + div span { display: block; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen pb-[120px]">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-surface dark:bg-surface-dim shadow-sm z-40 flex justify-between items-center h-14 px-margin-edge">
<div class="flex items-center gap-3">
<button class="text-primary dark:text-primary-fixed hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">sync</span>
</button>
</div>
<div class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim font-bold">
            FreshCart Logic
        </div>
<div class="flex items-center gap-3">
<button class="text-primary dark:text-primary-fixed hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">cloud_done</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="pt-20 px-margin-edge max-w-2xl mx-auto">
<!-- Category: Laticínios -->
<section class="mb-8 list-item-enter" style="animation-delay: 0.1s;">
<h2 class="font-label-lg text-label-lg text-primary mb-3 uppercase tracking-wider">Laticínios</h2>
<div class="bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] overflow-hidden border border-surface-variant">
<!-- Pending Item 1 -->
<label class="flex items-center h-list-item-height px-4 cursor-pointer hover:bg-surface-container-low transition-colors group relative border-b border-surface-variant/50 last:border-0">
<input class="peer sr-only checkbox-custom" type="checkbox"/>
<div class="w-6 h-6 rounded border-2 border-outline flex items-center justify-center mr-4 transition-colors group-hover:border-primary">
<span class="material-symbols-outlined text-on-primary-container text-[18px] hidden font-bold">check</span>
</div>
<div class="flex-1">
<span class="font-body-lg text-body-lg text-on-surface peer-checked:text-body-md-strikethrough peer-checked:text-on-surface-variant peer-checked:line-through transition-all">Leite Mimosa</span>
<p class="font-label-md text-label-md text-on-surface-variant">1 un • Meio Gordo</p>
</div>
<button class="text-outline-variant hover:text-on-surface-variant p-2 rounded-full transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100">
<span class="material-symbols-outlined">drag_indicator</span>
</button>
</label>
</div>
</section>
<!-- Category: Frutas e Vegetais -->
<section class="mb-8 list-item-enter" style="animation-delay: 0.2s;">
<h2 class="font-label-lg text-label-lg text-primary mb-3 uppercase tracking-wider">Frutas e Vegetais</h2>
<div class="bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] overflow-hidden border border-surface-variant">
<!-- Pending Item 2 -->
<label class="flex items-center h-list-item-height px-4 cursor-pointer hover:bg-surface-container-low transition-colors group relative border-b border-surface-variant/50 last:border-0">
<input class="peer sr-only checkbox-custom" type="checkbox"/>
<div class="w-6 h-6 rounded border-2 border-outline flex items-center justify-center mr-4 transition-colors group-hover:border-primary">
<span class="material-symbols-outlined text-on-primary-container text-[18px] hidden font-bold">check</span>
</div>
<div class="flex-1">
<span class="font-body-lg text-body-lg text-on-surface peer-checked:text-body-md-strikethrough peer-checked:text-on-surface-variant peer-checked:line-through transition-all">Bananas</span>
<p class="font-label-md text-label-md text-on-surface-variant">1 cacho • Frescas</p>
</div>
<button class="text-outline-variant hover:text-on-surface-variant p-2 rounded-full transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100">
<span class="material-symbols-outlined">drag_indicator</span>
</button>
</label>
</div>
</section>
<!-- Category: Limpeza (Completed) -->
<section class="mt-12 pt-6 border-t border-surface-variant/50 list-item-enter" style="animation-delay: 0.3s;">
<h2 class="font-label-lg text-label-lg text-outline mb-3 uppercase tracking-wider">No Carrinho (1)</h2>
<div class="bg-surface-container rounded-xl overflow-hidden opacity-60">
<!-- Checked Item -->
<label class="flex items-center h-list-item-height px-4 cursor-pointer hover:bg-surface-container-low transition-colors group relative border-b border-surface-variant/50 last:border-0 checked-item">
<input checked="" class="peer sr-only checkbox-custom" type="checkbox"/>
<div class="w-6 h-6 rounded border-2 border-primary-container bg-primary-container flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-on-primary-container text-[18px] block font-bold">check</span>
</div>
<div class="flex-1">
<span class="font-body-md-strikethrough text-body-md-strikethrough text-on-surface-variant line-through">Detergente</span>
<p class="font-label-md text-label-md text-on-surface-variant">1 un • Roupa Cor</p>
</div>
</label>
</div>
</section>
</main>
<!-- FAB -->
<button class="fixed bottom-24 right-margin-edge w-14 h-14 bg-primary-container text-on-primary-container rounded-2xl shadow-[0_4px_12px_rgba(0,0,0,0.15)] flex items-center justify-center hover:bg-tertiary-container transition-colors active:scale-95 z-40">
<span class="material-symbols-outlined font-bold text-[28px]">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container dark:bg-surface-container-low shadow-[0_-2px_8px_rgba(0,0,0,0.04)] h-bottom-nav-height flex justify-around items-center px-4 md:hidden">
<!-- Active Tab: List -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container dark:bg-tertiary-container dark:text-on-tertiary-container rounded-full px-5 py-1 hover:bg-surface-container-highest transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_basket</span>
<span class="font-label-md text-label-md mt-1">List</span>
</a>
<!-- Inactive Tab: Add -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-5 py-1 hover:bg-surface-container-highest transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">add_circle</span>
<span class="font-label-md text-label-md mt-1">Add</span>
</a>
<!-- Inactive Tab: History -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-5 py-1 hover:bg-surface-container-highest transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-md text-label-md mt-1">History</span>
</a>
<!-- Inactive Tab: Profile -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-5 py-1 hover:bg-surface-container-highest transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md mt-1">Profile</span>
</a>
</nav>
<!-- Desktop Nav Fallback (Hidden on Mobile) -->
<nav class="hidden md:flex fixed top-0 right-0 h-14 items-center pr-margin-edge z-50 gap-6">
<a class="text-primary font-label-lg text-label-lg flex items-center gap-2 hover:bg-surface-container-high px-3 py-2 rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_basket</span> List
        </a>
<a class="text-on-surface-variant font-label-lg text-label-lg flex items-center gap-2 hover:bg-surface-container-high px-3 py-2 rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined">add_circle</span> Add
        </a>
<a class="text-on-surface-variant font-label-lg text-label-lg flex items-center gap-2 hover:bg-surface-container-high px-3 py-2 rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined">history</span> History
        </a>
<a class="text-on-surface-variant font-label-lg text-label-lg flex items-center gap-2 hover:bg-surface-container-high px-3 py-2 rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined">person</span> Profile
        </a>
</nav>
<script>
        // Simple script to toggle checked state visuals slightly beyond CSS if needed, 
        // though CSS handles the primary visual changes via peer-checked.
        document.querySelectorAll('.checkbox-custom').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const label = e.target.closest('label');
                if(e.target.checked) {
                    label.classList.add('checked-item', 'list-item-leave');
                    // In a real app, we'd move this to the "No Carrinho" section after animation
                } else {
                    label.classList.remove('checked-item', 'list-item-leave');
                }
            });
        });
    </script>
</body></html>
